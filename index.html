<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <!-- Link para o Manifest -->
    <link rel="manifest" href="manifest.json">

    <!-- Configurações específicas para o iOS (Safari) funcionar como App -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Foco Academia">
    <link rel="apple-touch-icon" href="icone.ico">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Consistência na Academia</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <header>
            <h1>Foco na Consistência 💪</h1>
            <p class="subtitle">Disputa Saudável do Casal</p>
        </header>

        <main class="competition-grid">
            <!-- BLOCO RAFAEL (usuario1) -->
            <section class="athlete-card" id="card-usuario1">
                <h2 class="athlete-name rafael-title">Rafael ⚡</h2>
                
                <div class="dashboard-stats">
                    <div class="stat-box">
                        <h3>Streak Atual</h3>
                        <p id="streak-usuario1">0 Dias</p>
                    </div>
                    <div class="stat-box">
                        <h3>Meta Atual</h3>
                        <p id="phase-usuario1">1 Semana</p>
                        <div class="progress-bar-container">
                            <div class="progress-bar" id="progress-usuario1"></div>
                        </div>
                    </div>
                </div>

                <div class="goals-timeline">
                    <h3>Progresso do Bloco</h3>
                    <div class="badges">
                        <div class="badge" id="badge-usuario1-1w">1 Sem</div>
                        <div class="badge" id="badge-usuario1-2w">2 Sem</div>
                        <div class="badge" id="badge-usuario1-1m">1 Mês</div>
                        <div class="badge" id="badge-usuario1-2m">2 Mês</div>
                        <div class="badge" id="badge-usuario1-3m">3 Mês</div>
                    </div>
                </div>

                <div class="actions">
                    <button id="checkin-usuario1" class="btn-primary">Marcar Treino</button>
                    <button id="reset-usuario1" class="btn-danger">Falhei</button>
                </div>
            </section>

            <!-- BLOCO ISABELLY (usuario2) -->
            <section class="athlete-card" id="card-usuario2">
                <h2 class="athlete-name isabelly-title">Isabelly ✨</h2>
                
                <div class="dashboard-stats">
                    <div class="stat-box">
                        <h3>Streak Atual</h3>
                        <p id="streak-usuario2">0 Dias</p>
                    </div>
                    <div class="stat-box">
                        <h3>Meta Atual</h3>
                        <p id="phase-usuario2">1 Semana</p>
                        <div class="progress-bar-container">
                            <div class="progress-bar" id="progress-usuario2"></div>
                        </div>
                    </div>
                </div>

                <div class="goals-timeline">
                    <h3>Progresso do Bloco</h3>
                    <div class="badges">
                        <div class="badge" id="badge-usuario2-1w">1 Sem</div>
                        <div class="badge" id="badge-usuario2-2w">2 Sem</div>
                        <div class="badge" id="badge-usuario2-1m">1 Mês</div>
                        <div class="badge" id="badge-usuario2-2m">2 Mês</div>
                        <div class="badge" id="badge-usuario2-3m">3 Mês</div>
                    </div>
                </div>

                <div class="actions">
                    <button id="checkin-usuario2" class="btn-primary">Marcar Treino</button>
                    <button id="reset-usuario2" class="btn-danger">Falhei</button>
                </div>
            </section>
        </main>
    </div>

    <script src="script.js"></script>
</body>

</html>
